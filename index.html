<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel Ventana al Llano</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family:'Segoe UI',sans-serif;
text-align:center;
margin:0;
background:linear-gradient(135deg,#d4fc79,#96e6a1);
}

.soporte{
background:linear-gradient(90deg,#11998e,#38ef7d);
color:white;
padding:12px;
position:fixed;
top:0;
width:100%;
overflow:hidden;
white-space:nowrap;
cursor:pointer;
}

.soporte span{
display:inline-block;
padding-left:100%;
animation:mover 20s linear infinite;
}

@keyframes mover{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{margin-top:120px;}

.card{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:inline-block;
width:300px;
}

/* inputs */
input{
padding:12px;
margin:8px;
width:90%;
border-radius:10px;
border:none;
background:#f1f1f1;
}

button{
padding:12px;
margin-top:12px;
background:linear-gradient(90deg,#00c853,#64dd17);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.factura,.pase{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
}

.alerta{
background:#ffeb3b;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.qr-container{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:10px;
}
</style>
</head>

<body onload="verificarHoy()">

<div class="soporte" onclick="abrirWhatsApp()">
<span id="textoSoporte"></span>
</div>

<div class="container">

<div class="card">
<h2>Compra tu Pasadía 🌿</h2>

<!-- 🔥 ESTRUCTURA COMO LA PEDISTE -->
<input type="text" id="nombre" placeholder="NOMBRE">

<input type="text" id="fecha" placeholder="DD/MM/AA">

<label>ADULTO</label>
<input type="number" id="adultos" value="0" min="0">

<label>NIÑO</label>
<input type="number" id="ninos" value="0" min="0">

<div id="promoTexto"></div>

<button onclick="comprar()">Calcular</button>
</div>

<div id="factura"></div>
<div id="pase"></div>

</div>

<script>

/* soporte */
let mensajes=[
"📞 Atención al cliente",
"🌿 Bienvenido a Ventana al Llano",
"🔥 Promos activas",
"💳 Pagos fáciles",
"🎟 Reserva aquí"
];

let i=0;
setInterval(()=>{
textoSoporte.innerText=mensajes[i];
i=(i+1)%mensajes.length;
},5000);

function formatear(n){
return n.toLocaleString("es-CO");
}

let promoActiva=false;

function verificarHoy(){
if(new Date().getDay()===3){
promoActiva=true;
}
}

/* 🔥 COMPRA BIEN HECHA */
function comprar(){

let nombre = document.getElementById("nombre").value;
let fecha = document.getElementById("fecha").value;

let a = Number(adultos.value);
let ni = Number(ninos.value);

/* 🚨 BLOQUEO REAL DE NEGATIVOS */
if(a < 0 || isNaN(a)) a = 0;
if(ni < 0 || isNaN(ni)) ni = 0;

let pa = promoActiva ? 20000 : 25000;
let pn = promoActiva ? 10000 : 15000;

let total = (a * pa) + (ni * pn);

factura.innerHTML = `
<div class="factura">

<h3>Resumen de Reserva</h3>

<b>Nombre:</b> ${nombre}<br>
<b>Fecha:</b> ${fecha}<br><br>

<b>Adulto:</b> ${a}<br>
<b>Niño:</b> ${ni}<br><br>

<strong>Total: $${formatear(total)}</strong><br><br>

<input type="file" id="comprobante"><br>

<button onclick="confirmar(${total})">Confirmar Pago</button>

</div>
`;
}

/* CONFIRMAR + QR + WHATSAPP */
function confirmar(total){

if(!comprobante.files.length){
alert("⚠️ Sube el comprobante");
return;
}

let mensajeWA = encodeURIComponent(
"Hola 👋 ya realicé el pago. Adjunto el comprobante."
);

pase.innerHTML = `
<div class="pase">

<h3>🎟 PASE DE RESERVA</h3>

<div class="alerta">
Total: $${formatear(total)}
</div>

<div class="qr-container">
<div id="qr"></div>
<div id="qrPago"></div>
</div>

</div>`;

/* QR */
new QRCode(document.getElementById("qr"),{
text:"Reserva Hotel Ventana al Llano",
width:120,
height:120
});

new QRCode(document.getElementById("qrPago"),{
text:"Pago Hotel Ventana al Llano",
width:120,
height:120
});

/* WhatsApp automático */
setTimeout(()=>{
window.open("https://wa.me/573113822023?text="+mensajeWA,"_blank");
},1200);

}

/* soporte */
function abrirWhatsApp(){
window.open("https://wa.me/573113822023?text=Hola%20quiero%20información","_blank");
}

</script>

</body>
</html>
