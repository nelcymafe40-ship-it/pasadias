<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel Ventana al Llano</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
text-align:center;
margin:0;
background:linear-gradient(135deg,#d4fc79,#96e6a1);
}

/* BARRA */
.soporte{
background:linear-gradient(90deg,#11998e,#38ef7d);
color:white;
padding:12px;
position:fixed;
top:0;
width:100%;
overflow:hidden;
white-space:nowrap;
cursor:pointer;
}

.soporte span{
display:inline-block;
padding-left:100%;
animation:mover 20s linear infinite;
}

@keyframes mover{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{margin-top:120px;}

.logo{
width:220px;
margin-top:10px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:inline-block;
width:280px;
}

input{
padding:12px;
margin:8px;
width:90%;
border-radius:10px;
border:none;
background:#f1f1f1;
}

button{
padding:12px;
margin-top:12px;
background:linear-gradient(90deg,#00c853,#64dd17);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.factura,.pase{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
}

.alerta{
background:#ffeb3b;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.promo{
background:#e8f5e9;
padding:10px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}

/* BOTONES */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}

.instagram{
position:fixed;
bottom:80px;
right:20px;
background:#E1306C;
color:white;
padding:12px 15px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

#qr{margin-top:10px;}

/* ⭐ TOAST */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#222;
color:white;
padding:14px 20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
font-weight:bold;
z-index:9999;
opacity:0;
transition:0.4s;
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(10px);
}

@media print {
body * { visibility: hidden; }
.pase, .pase * { visibility: visible; }
.pase { position:absolute; top:0; left:0; width:100%; }
}

</style>
</head>

<body onload="verificarHoy()">

<div class="soporte" onclick="abrirWhatsApp()">
<span id="textoSoporte"></span>
</div>

<div class="container">

<img src="logo.png" class="logo"
onerror="this.src='https://cdn-icons-png.flaticon.com/512/139/139899.png'">

<div id="mensajeHoy"></div>

<div class="card">
<h2>Compra tu Pasadía 🌿</h2>

<input type="text" id="nombre" placeholder="Nombre"><br>

<input type="number" id="adultos"
placeholder="cuantas pasadias adultos desea comprar?"
value="0" min="0"
oninput="if(this.value<0)this.value=0"><br>

<input type="number" id="ninos"
placeholder="cuantas pasadias niños desea comprar? *"
value="0" min="0"
oninput="if(this.value<0)this.value=0"><br>

<input type="date" id="fecha" onchange="verificarPromo"><br>

<div id="promoTexto"></div>

<button onclick="comprar()">Calcular</button>
</div>

<div id="factura"></div>
<div id="pase"></div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<a href="https://wa.me/573113822023" class="whatsapp">💬</a>

<a href="https://www.instagram.com/ecocabanasventanallano?igsh=aGFxeHppcjM3ZWll&utm_source=qr"
class="instagram" target="_blank">📷 Instagram</a>

<script>

function abrirWhatsApp(){
let mensaje="Hola 👋✨, quiero información sobre los pasadías en Hotel Ventana al Llano 🌿";
let url="https://wa.me/573113822023?text="+encodeURIComponent(mensaje);
window.open(url);
}

function mostrarAlerta(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},3000);
}

let mensajes=[
"📞 Atención al cliente (toca aquí)",
"🌿 Bienvenido a Ventana al Llano",
"🔥 Aprovecha nuestros pasadías",
"💳 Pagos fáciles",
"🎟 Reserva aquí"
];

let i=0;
setInterval(()=>{
textoSoporte.innerText=mensajes[i];
i=(i+1)%mensajes.length;
},5000);

function formatear(n){return n.toLocaleString("es-CO");}

let promoActiva=false;

function verificarHoy(){
let hoy=new Date();
if(hoy.getDay()===3){
promoActiva=true;
mensajeHoy.innerHTML="<div class='alerta'>🔥 HOY ES MIÉRCOLES: PROMO ACTIVA</div>";
}
}

function verificarPromo(){
let f=new Date(fecha.value);
promoActiva=(f.getDay()===3);

promoTexto.innerHTML=promoActiva
? "<div class='promo'>Adultos $20.000 | Niños $10.000</div>"
: "";
}

function guardarReserva(c,d){
let r=JSON.parse(localStorage.getItem("reservas"))||{};
r[c]=d;
localStorage.setItem("reservas",JSON.stringify(r));
}

function descargarReserva(data){
let txt=`RESERVA\nNombre:${data.nombre}\nFecha:${data.fecha}\nTotal:$${formatear(data.total)}\nCodigo:${data.codigo}`;
let blob=new Blob([txt]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="reserva_"+data.codigo+".txt";
a.click();
}

function comprar(){
let n=nombre.value,f=fecha.value,a=+adultos.value,ni=+ninos.value;

let pa=promoActiva?20000:25000;
let pn=promoActiva?10000:15000;

let total=(a*pa)+(ni*pn);

factura.innerHTML=`
<div class='factura'>
<h3>Resumen</h3>
Adulto: $${formatear(pa)}<br>
Niño: $${formatear(pn)}<br><br>
<strong>Total: $${formatear(total)}</strong><br><br>

<input type='file' id='comprobante'><br>
<button onclick='confirmar(${total})'>Confirmar Pago</button>
</div>`;
}

function confirmar(total){

if(!comprobante.files.length){
mostrarAlerta("⚠️ Sube el comprobante");
return;
}

let n=nombre.value,f=fecha.value,a=adultos.value,ni=ninos.value;
let c=Math.floor(Math.random()*900000+100000);

guardarReserva(c,{nombre:n,fecha:f,adultos:a,ninos:ni,total});

// WhatsApp
let msg=`Hola 👋%0A%0AHe realizado el pago en *Hotel Ventana al Llano* 🌿%0A%0A👤 ${n}%0A📅 ${f}%0A👥 Adultos: ${a}%0A👶 Niños: ${ni}%0A💰 Total: $${formatear(total)}%0A%0AAdjunto comprobante 🙌`;
window.open("https://wa.me/573113822023?text="+msg);

// descarga
descargarReserva({nombre:n,fecha:f,total,codigo:c});

// pase
let pa=promoActiva?20000:25000;
let pn=promoActiva?10000:15000;

let detalle="";

if(a > 0){
detalle += `
<div style="background:#ff9800;color:white;padding:12px;border-radius:12px;margin:6px;">
<strong>Hotel Ventana al Llano</strong><br>
Adulto 🧑<br>
Cantidad: ${a}<br>
Valor: $${formatear(pa)}
</div>`;
}

if(ni > 0){
detalle += `
<div style="background:#e53935;color:white;padding:12px;border-radius:12px;margin:6px;">
<strong>Hotel Ventana al Llano</strong><br>
Niño 👶<br>
Cantidad: ${ni}<br>
Valor: $${formatear(pn)}
</div>`;
}

pase.innerHTML=`
<div class='pase'>
<h3>🎟 PASE OFICIAL</h3>
Cliente: ${n}<br>
Fecha: ${f}<br>
Código: ${c}<br><br>

${detalle}

<div id='qr'></div><br>

<button onclick='window.print()'>Descargar</button>
</div>`;

new QRCode(document.getElementById("qr"),{
text:c.toString(),
width:120,
height:120
});
}

</script>

</body>
</html>
