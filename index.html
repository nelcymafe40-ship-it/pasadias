<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel Ventana al Llano</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
text-align:center;
margin:0;
background:linear-gradient(135deg,#d4fc79,#96e6a1);
}

.soporte{
background:linear-gradient(90deg,#11998e,#38ef7d);
color:white;
padding:12px;
position:fixed;
top:0;
width:100%;
overflow:hidden;
white-space:nowrap;
}

.soporte span{
display:inline-block;
padding-left:100%;
animation:mover 12s linear infinite;
}

@keyframes mover{
0%{transform:translateX(100%); opacity:0;}
10%{opacity:1;}
90%{opacity:1;}
100%{transform:translateX(-100%); opacity:0;}
}

.container{margin-top:120px;}

.logo{
width:260px;
margin-bottom:10px;
}

.slogan{
font-style:italic;
color:#2e7d32;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
display:inline-block;
width:300px;
transition:0.3s;
}

/* estado promo */
.promo-activa{
border:3px solid #00c853;
box-shadow:0 0 20px rgba(0,200,83,0.6);
}

input{
padding:12px;
margin:8px 0;
width:90%;
border-radius:10px;
border:none;
background:#f1f1f1;
}

button{
padding:12px;
margin-top:12px;
background:linear-gradient(90deg,#00c853,#64dd17);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
}

.factura{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
}

.galeria img{
width:90%;
max-width:300px;
border-radius:15px;
margin:10px 0;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}

.instagram{
position:fixed;
bottom:80px;
right:20px;
background:#E1306C;
color:white;
padding:12px 15px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="soporte">
<span id="textoSoporte"></span>
</div>

<div class="container">

<!-- LOGO -->
<img src="logo.jpg" class="logo">

<div class="slogan">🌿 Donde la naturaleza se convierte en descanso 🌿</div>

<div class="card">
<h2>Compra tu Pasadía 🌿</h2>

<label><b>Nombre:</b></label>
<input type="text" id="nombre" placeholder="Escribe tu nombre">

<label><b>Fecha de visita:</b></label>
<input type="date" id="fecha" onchange="verificarPromo()">

<div id="promoTexto"></div>

<label><b>¿Cuántos pasadías de ADULTO deseas comprar?</b></label>
<input type="number" id="adultos" value="0" min="0" oninput="this.value = Math.abs(this.value)">

<label><b>¿Cuántos pasadías de NIÑOS deseas comprar?</b></label>
<input type="number" id="ninos" value="0" min="0" oninput="this.value = Math.abs(this.value)">

<button onclick="comprar()">Calcular total</button>

<div id="factura"></div>

</div>

<!-- GALERIA -->
<div class="galeria">
<h3>Conoce nuestras instalaciones</h3>
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
</div>

</div>

<!-- BOTON INSTAGRAM -->
<a href="https://www.instagram.com/ecocabanasventanallano?igsh=aGFxeHppcjM3ZWll&utm_source=qr" 
class="instagram" target="_blank">📷</a>

<a href="#" onclick="abrirWhatsApp()" class="whatsapp">💬</a>

<script>
let mensajes = [
"🌿 Bienvenido a Hotel Ventana al Llano",
"🎟 Reserva tu pasadía aquí",
"💳 Pagos por Nequi, Bancolombia y Llave",
"🔥 Promociones todos los miércoles",
"📞 Escríbenos por WhatsApp"
];

let i = 0;
function cambiarMensaje(){
document.getElementById("textoSoporte").innerText = mensajes[i];
i = (i + 1) % mensajes.length;
}
setInterval(cambiarMensaje, 4000);
cambiarMensaje();

let promoActiva = false;

function verificarPromo(){
let fechaInput = document.getElementById("fecha").value;
let f = fechaInput ? new Date(fechaInput) : new Date();
let dia = f.getDay();

let card = document.querySelector('.card');

if(dia === 3){
promoActiva = true;
card.classList.add('promo-activa');

document.getElementById("promoTexto").innerHTML = `
<div style="background:#c8f7c5;padding:10px;border-radius:10px;font-weight:bold;">
🔥 PROMOCIÓN MIÉRCOLES ACTIVA
</div>`;

} else {
promoActiva = false;
card.classList.remove('promo-activa');
document.getElementById("promoTexto").innerHTML = "";
}
} else {
promoActiva = false;
document.getElementById("promoTexto").innerHTML = "";
}
} else {
promoActiva = false;
document.getElementById("promoTexto").innerHTML = "";
}
}

function formatear(n){
return n.toLocaleString("es-CO");
}

function comprar(){
let nombre = document.getElementById("nombre").value;

let adultos = parseInt(document.getElementById("adultos").value);
let ninos = parseInt(document.getElementById("ninos").value);

// corregir valores inválidos
adultos = isNaN(adultos) || adultos < 0 ? 0 : adultos;
ninos = isNaN(ninos) || ninos < 0 ? 0 : ninos;

if(!nombre){
alert("Escribe tu nombre");
return;
}

if(adultos === 0 && ninos === 0){
alert("Debes seleccionar al menos 1 pasadía");
return;
}

// determinar fecha (la elegida o hoy)
let fechaInput = document.getElementById("fecha").value;
let f = fechaInput ? new Date(fechaInput) : new Date();
let esMiercoles = f.getDay() === 3;

let precioAdulto = esMiercoles ? 15000 : 25000;
let precioNino = esMiercoles ? 8000 : 15000;

let total = (adultos * precioAdulto) + (ninos * precioNino);

document.getElementById("factura").innerHTML = `
<div class="factura">
<b>Resumen</b><br><br>
Nombre: ${nombre}<br>
Adultos: ${adultos}<br>
Niños: ${ninos}<br><br>
<b>Total: $${formatear(total)}</b><br><br>
<button onclick="enviarWhatsApp('${nombre}',${adultos},${ninos},${total})">Reservar</button>
</div>`;
}

if(adultos < 0 || ninos < 0){
alert("No se permiten valores negativos");
return;
}

if(adultos === 0 && ninos === 0){
alert("Debes seleccionar al menos 1 pasadía");
return;
}

let precioAdulto = promoActiva ? 20000 : 25000;
let precioNino = promoActiva ? 10000 : 15000;

let total = (adultos * precioAdulto) + (ninos * precioNino);

document.getElementById("factura").innerHTML = `
<div class="factura">
<b>Resumen</b><br><br>
Nombre: ${nombre}<br>
Adultos: ${adultos}<br>
Niños: ${ninos}<br><br>
<b>Total: $${formatear(total)}</b><br><br>
<button onclick="enviarWhatsApp('${nombre}',${adultos},${ninos},${total})">Reservar</button>
</div>`;
}

let precioAdulto = promoActiva ? 20000 : 25000;
let precioNino = promoActiva ? 10000 : 15000;

let total = (adultos * precioAdulto) + (ninos * precioNino);

document.getElementById("factura").innerHTML = `
<div class="factura">
<b>Resumen</b><br><br>
Nombre: ${nombre}<br>
Adultos: ${adultos}<br>
Niños: ${ninos}<br><br>
<b>Total: $${formatear(total)}</b><br><br>
<button onclick="enviarWhatsApp('${nombre}',${adultos},${ninos},${total})">Reservar</button>
</div>`;
}

function enviarWhatsApp(nombre, adultos, ninos, total){
let mensaje = `Hola, quiero reservar una pasadía 🌿%0A
Nombre: ${nombre}%0A
Adultos: ${adultos}%0A
Niños: ${ninos}%0A
Total: $${total}`;
window.open(`https://wa.me/573113822023?text=${mensaje}`);
}

// BOTON ATENCION AL CLIENTE
function abrirWhatsApp(){
let mensajes = [
"Hola, quiero reservar una pasadía 🌿",
"Hola, quiero más información sobre las pasadías 😊",
"Buenas, me gustaría conocer precios y disponibilidad 📅"
];

let mensaje = mensajes[Math.floor(Math.random() * mensajes.length)];

window.open(`https://wa.me/573113822023?text=${encodeURIComponent(mensaje)}`);
}%0A
Adultos: ${adultos}%0A
Niños: ${ninos}%0A
Total: $${total}`;
window.open(`https://wa.me/573113822023?text=${mensaje}`);
}
</script>

</body>
</html>
