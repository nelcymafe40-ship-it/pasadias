<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel Ventana al Llano</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family:'Segoe UI',sans-serif;
text-align:center;
margin:0;
background:linear-gradient(135deg,#d4fc79,#96e6a1);
}

.container{margin-top:120px;}

.card{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:inline-block;
width:300px;
}

input{
padding:12px;
margin:8px;
width:90%;
border-radius:10px;
border:none;
background:#f1f1f1;
}

button{
padding:12px;
margin-top:12px;
background:linear-gradient(90deg,#00c853,#64dd17);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.factura,.pase{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
}

.alerta{
background:#ffeb3b;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.qr-container{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Compra tu Pasadía 🌿</h2>

<!-- ✔ NO TOCO TU DISEÑO -->
<input type="text" id="nombre" placeholder="NOMBRE">

<!-- ✔ ESTO SE QUEDA COMO ESTABA (CALENDARIO) -->
<input type="date" id="fecha">

<label>ADULTO</label>
<input type="number" id="adultos" value="0" min="0">

<label>NIÑO</label>
<input type="number" id="ninos" value="0" min="0">

<button onclick="comprar()">Calcular</button>
</div>

<div id="factura"></div>
<div id="pase"></div>

</div>

<script>

function formatear(n){
return n.toLocaleString("es-CO");
}

/* 🔥 SOLO ARREGLO DE LÓGICA (NO DISEÑO) */
function comprar(){

let nombre = document.getElementById("nombre").value;
let fecha = document.getElementById("fecha").value;

let a = Number(document.getElementById("adultos").value);
let ni = Number(document.getElementById("ninos").value);

/* 🚨 BLOQUEO REAL DE NEGATIVOS (ESTO ES LO IMPORTANTE) */
if(!Number.isFinite(a) || a < 0) a = 0;
if(!Number.isFinite(ni) || ni < 0) ni = 0;

let pa = 25000;
let pn = 15000;

let total = (a * pa) + (ni * pn);

factura.innerHTML = `
<div class="factura">

<h3>Resumen de Reserva</h3>

<b>Nombre:</b> ${nombre}<br>
<b>Fecha:</b> ${fecha}<br><br>

<b>Adultos:</b> ${a}<br>
<b>Niños:</b> ${ni}<br><br>

<strong>Total: $${formatear(total)}</strong><br><br>

<input type="file" id="comprobante"><br>

<button onclick="confirmar(${total})">Confirmar Pago</button>

</div>
`;
}

function confirmar(total){

if(!comprobante.files.length){
alert("⚠️ Sube el comprobante");
return;
}

let mensajeWA = encodeURIComponent(
"Hola 👋 ya realicé el pago. Adjunto el comprobante."
);

pase.innerHTML = `
<div class="pase">

<h3>🎟 Reserva</h3>

<div class="alerta">
Total: $${formatear(total)}
</div>

<div class="qr-container">
<div id="qr"></div>
<div id="qrPago"></div>
</div>

</div>`;

/* QR */
new QRCode(document.getElementById("qr"),{
text:"Reserva Hotel Ventana al Llano",
width:120,
height:120
});

new QRCode(document.getElementById("qrPago"),{
text:"Pago Hotel Ventana al Llano",
width:120,
height:120
});

/* WhatsApp automático */
setTimeout(()=>{
window.open("https://wa.me/573113822023?text="+mensajeWA,"_blank");
},1200);

}

</script>

</body>
</html>
