<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel Ventana al Llano</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family:'Segoe UI',sans-serif;
text-align:center;
margin:0;
background:linear-gradient(135deg,#d4fc79,#96e6a1);
}

.soporte{
background:linear-gradient(90deg,#11998e,#38ef7d);
color:white;
padding:12px;
position:fixed;
top:0;
width:100%;
overflow:hidden;
white-space:nowrap;
cursor:pointer;
}

.soporte span{
display:inline-block;
padding-left:100%;
animation:mover 20s linear infinite;
}

@keyframes mover{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{margin-top:120px;}

.card{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:inline-block;
width:300px;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input{
padding:12px;
margin:8px;
width:90%;
border-radius:10px;
border:none;
background:#f1f1f1;
}

button{
padding:12px;
margin-top:12px;
background:linear-gradient(90deg,#00c853,#64dd17);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.factura,.pase{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
}

.alerta{
background:#ffeb3b;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.qr-container{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:10px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}

.instagram{
position:fixed;
bottom:80px;
right:20px;
background:#E1306C;
color:white;
padding:12px 15px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body onload="verificarHoy()">

<div class="soporte" onclick="abrirWhatsApp()">
<span id="textoSoporte"></span>
</div>

<div class="container">

<div class="card">
<h2>Compra tu Pasadía 🌿</h2>

<label>Adultos</label>
<input type="number" id="adultos" value="0" min="0">

<label>Niños</label>
<input type="number" id="ninos" value="0" min="0">

<input type="date" id="fecha" onchange="verificarPromo()">

<div id="promoTexto"></div>

<button onclick="comprar()">Calcular</button>
</div>

<div id="factura"></div>
<div id="pase"></div>

</div>

<a href="https://wa.me/573113822023" class="whatsapp">💬</a>

<a href="https://www.instagram.com/ecocabanasventanallano?igsh=aGFxeHppcjM3ZWll&utm_source=qr"
class="instagram" target="_blank">📷</a>

<script>

// soporte
let mensajes=[
"📞 Atención al cliente (toca aquí)",
"🌿 Bienvenido a Ventana al Llano",
"🔥 Aprovecha nuestros pasadías",
"💳 Pagos fáciles",
"🎟 Reserva aquí"
];

let i=0;
setInterval(()=>{
textoSoporte.innerText=mensajes[i];
i=(i+1)%mensajes.length;
},5000);

function formatear(n){return n.toLocaleString("es-CO");}

let promoActiva=false;

function verificarPromo(){
let f=new Date(fecha.value);
promoActiva=(f.getDay()===3);

promoTexto.innerHTML=promoActiva
? "<div class='alerta'>🔥 PROMO MIÉRCOLES ACTIVA</div>"
: "";
}

function verificarHoy(){
if(new Date().getDay()===3){
promoActiva=true;
}
}

// 🔥 COMPRA SEGURA
function comprar(){

let a = parseInt(adultos.value);
let ni = parseInt(ninos.value);

// 🚨 BLOQUEO TOTAL
if(isNaN(a) || a < 0) a = 0;
if(isNaN(ni) || ni < 0) ni = 0;

let pa = promoActiva ? 20000 : 25000;
let pn = promoActiva ? 10000 : 15000;

let total = (a * pa) + (ni * pn);

factura.innerHTML = `
<div class="factura">

<h3>Resumen de Reserva</h3>

<b>Adultos:</b> ${a} ($${formatear(pa)})<br>
<b>Niños:</b> ${ni} ($${formatear(pn)})<br><br>

<strong>Total: $${formatear(total)}</strong><br><br>

<input type='file' id='comprobante'><br>

<button onclick="confirmar(${total})">Confirmar Pago</button>

</div>
`;
}

// CONFIRMAR + WHATSAPP
function confirmar(total){

if(!comprobante.files.length){
alert("⚠️ Sube el comprobante");
return;
}

let mensajeWA = encodeURIComponent(
"Hola, ya realicé el pago. Adjunto el comprobante en este chat."
);

// QR simple
pase.innerHTML = `
<div class="pase">

<h3>🎟 Reserva generada</h3>

<div class="alerta">
Total: $${formatear(total)}
</div>

<br>

<div class="qr-container">
<div id="qr"></div>
<div id="qrPago"></div>
</div>

</div>`;

// QR
new QRCode(document.getElementById("qr"),{
text:"Reserva Hotel Ventana al Llano",
width:120,
height:120
});

new QRCode(document.getElementById("qrPago"),{
text:"Pago Hotel Ventana al Llano",
width:120,
height:120
});

// WhatsApp automático
setTimeout(()=>{
window.open("https://wa.me/573113822023?text="+mensajeWA,"_blank");
},1200);

}

// soporte click
function abrirWhatsApp(){
let mensaje="Hola 👋 quiero información";
window.open("https://wa.me/573113822023?text="+encodeURIComponent(mensaje));
}

</script>

</body>
</html>
