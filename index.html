}

/* 🔥 BARRA */
.soporte{
background:linear-gradient(90deg,#11998e,#38ef7d);

padding:12px;
position:fixed;
top:0;
width:100%;
overflow:hidden;

}

#ctaBarra{
position:absolute;

height:100%;

align-items:center;

font-weight:bold;
opacity:0;

pointer-events:none;
}

@keyframes mover{
0%{transform:translateX(100%);}
70%{transform:translateX(0);}
100%{transform:translateX(0);}
}

.logo{width:220px;}

.card{
background:rgba(255,255,255,0.9);

width:280px;
}

input{
padding:12px;
margin:8px;
width:90%;
border-radius:10px;
border:none;
background:#f1f1f1;
}

button{
padding:12px;
margin-top:12px;
background:linear-gradient(90deg,#00c853,#64dd17);
color:white;
border:none;
border-radius:10px;

}

.factura,.pase{
