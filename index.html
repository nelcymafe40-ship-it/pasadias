<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel Ventana al Llano</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family:'Segoe UI',sans-serif;
text-align:center;
margin:0;
background:linear-gradient(135deg,#d4fc79,#96e6a1);
}

.soporte{
background:linear-gradient(90deg,#11998e,#38ef7d);
color:white;
padding:12px;
position:fixed;
top:0;
width:100%;
overflow:hidden;
white-space:nowrap;
cursor:pointer;
}

.soporte span{
display:inline-block;
padding-left:100%;
animation:mover 20s linear infinite;
}

@keyframes mover{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{margin-top:120px;}

.logo{width:220px;margin-top:10px;}

.card{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:inline-block;
width:280px;
}

input{
padding:12px;
margin:8px;
width:90%;
border-radius:10px;
border:none;
background:#f1f1f1;
}

button{
padding:12px;
margin-top:12px;
background:linear-gradient(90deg,#00c853,#64dd17);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.factura,.pase{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
}

.alerta{
background:#ffeb3b;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.promo{
background:#e8f5e9;
padding:10px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}

.instagram{
position:fixed;
bottom:80px;
right:20px;
background:#E1306C;
color:white;
padding:12px 15px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

.qr-container{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:10px;
}

.qr-box{text-align:center;}

#qr,#qrPago{margin-top:10px;}

@media print {
body * { visibility: hidden; }
.pase, .pase * { visibility: visible; }
.pase { position:absolute; top:0; left:0; width:100%; }
}
</style>
</head>

<body onload="verificarHoy()">

<div class="soporte" onclick="abrirWhatsApp()">
<span id="textoSoporte"></span>
</div>

<div class="container">

<img src="logo.png" class="logo"
onerror="this.src='https://cdn-icons-png.flaticon.com/512/139/139899.png'">

<div id="mensajeHoy"></div>

<div class="card">
<h2>Compra tu Pasadía 🌿</h2>

<!-- 🔒 BLOQUEO DE NEGATIVOS -->
<input type="number" id="adultos" value="0" min="0"><br>
<input type="number" id="ninos" value="0" min="0"><br>

<div id="promoTexto"></div>

<input type="date" id="fecha" onchange="verificarPromo()"><br>

<button onclick="comprar()">Calcular</button>
</div>

<div id="factura"></div>
<div id="pase"></div>

</div>

<a href="https://wa.me/573113822023" class="whatsapp">💬</a>

<a href="https://www.instagram.com/ecocabanasventanallano?igsh=aGFxeHppcjM3ZWll&utm_source=qr"
class="instagram" target="_blank">📷 Instagram</a>

<script>

// WhatsApp soporte
function abrirWhatsApp(){
let mensaje="Hola 👋✨, quiero información sobre los pasadías en Hotel Ventana al Llano 🌿";
window.open("https://wa.me/573113822023?text="+encodeURIComponent(mensaje));
}

// barra
let mensajes=[
"📞 Atención al cliente (toca aquí)",
"🌿 Bienvenido a Ventana al Llano",
"🔥 Aprovecha nuestros pasadías",
"💳 Pagos fáciles",
"🎟 Reserva aquí"
];

let i=0;
setInterval(()=>{
textoSoporte.innerText=mensajes[i];
i=(i+1)%mensajes.length;
},5000);

function formatear(n){return n.toLocaleString("es-CO");}

let promoActiva=false;

function verificarHoy(){
if(new Date().getDay()===3){
promoActiva=true;
mensajeHoy.innerHTML="<div class='alerta'>🔥 PROMO MIÉRCOLES ACTIVA</div>";
}
}

function verificarPromo(){
let f=new Date(fecha.value);
promoActiva=(f.getDay()===3);

promoTexto.innerHTML=promoActiva
? "<div class='promo'>Adultos $20.000 | Niños $10.000</div>"
: "";
}

// COMPRA (BLINDADO)
function comprar(){

let a = parseInt(adultos.value);
let ni = parseInt(ninos.value);

// 🚨 BLOQUEO REAL DE NEGATIVOS
if(isNaN(a) || a < 0) a = 0;
if(isNaN(ni) || ni < 0) ni = 0;

let pa=promoActiva?20000:25000;
let pn=promoActiva?10000:15000;

let total=(a*pa)+(ni*pn);

factura.innerHTML=`
<div class='factura'>

<h3>Resumen de Reserva</h3>

Adultos: ${a} ($${formatear(pa)})<br>
Niños: ${ni} ($${formatear(pn)})<br><br>

<strong>Total: $${formatear(total)}</strong><br><br>

<div class='promo'>
🔒 Pago seguro<br><br>

<strong>Nequi:</strong><br>
321 277 3549<br>
Oneida Beltrán<br><br>

<strong>Bancolombia:</strong><br>
84943216770 - Ahorros<br>
Oneida Beltrán<br>
CC: 35285659<br><br>

<strong>Llave BRE:</strong><br>
86065356
</div><br>

<input type='file' id='comprobante'><br>

<button onclick='confirmar(${total})'>Confirmar Pago</button>

</div>`;
}

// CONFIRMAR
function confirmar(total){

if(!comprobante.files.length){
alert("⚠️ Debes subir el comprobante de pago antes de continuar");
return;
}

let n=nombre.value,f=fecha.value;

let mensajeWA = encodeURIComponent(
"Hola, ya realicé el pago. Adjunto el comprobante en este chat."
);

pase.innerHTML=`
<div class='pase'>

<h3>🎟 PASE OFICIAL</h3>

${n}<br>${f}<br><br>

<div class="qr-container">

<div class="qr-box">
<strong>Reserva</strong>
<div id="qr"></div>
</div>

<div class="qr-box">
<strong>Pago</strong>
<div id="qrPago"></div>
</div>

</div>

<br>

<div class="alerta">
📌 Guarda este pase y envía el comprobante por WhatsApp para validar tu entrada
</div>

<br>

<button onclick='window.print()'>Descargar</button>

</div>`;

// QR
new QRCode(document.getElementById("qr"),{
text:"Reserva Hotel Ventana al Llano",
width:120,
height:120
});

new QRCode(document.getElementById("qrPago"),{
text:"Pago Hotel Ventana al Llano",
width:120,
height:120
});

// 🔥 WhatsApp automático
setTimeout(() => {
window.open("https://wa.me/573113822023?text=" + mensajeWA, "_blank");
}, 1200);

}

</script>

</body>
</html>
