<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel Ventana al Llano</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family: 'Segoe UI', sans-serif;
text-align:center;
margin:0;
background: linear-gradient(135deg, #d4fc79, #96e6a1);
}

/* BARRA MÁS LENTA */
.soporte{
background: linear-gradient(90deg, #11998e, #38ef7d);
color:white;
padding:12px;
position:fixed;
top:0;
width:100%;
overflow:hidden;
white-space:nowrap;
}

.soporte span{
display:inline-block;
padding-left:100%;
animation: mover 30s linear infinite; /* 👈 MÁS LENTO */
}

@keyframes mover{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{
margin-top:120px;
}

.logo{
width:220px;
}

.card{
background: rgba(255,255,255,0.9);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
display:inline-block;
width:280px;
}

input{
padding:12px;
margin:8px;
width:90%;
border-radius:10px;
border:none;
background:#f1f1f1;
}

button{
padding:12px;
margin-top:12px;
background: linear-gradient(90deg, #00c853, #64dd17);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.factura, .pase{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
}

.alerta{
background:#ffeb3b;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.promo{
background:#e8f5e9;
padding:12px;
border-radius:10px;
margin-top:10px;
}

/* BOTONES */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:20px;
}

/* 🔥 INSTAGRAM MEJORADO */
.instagram{
position:fixed;
bottom:80px;
right:20px;
background:#E1306C;
color:white;
padding:12px 15px;
border-radius:30px;
text-decoration:none;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
gap:5px;
}

#qr{margin-top:10px;}

@media print {
body * { visibility: hidden; }
.pase, .pase * { visibility: visible; }
.pase { position:absolute; top:0; left:0; width:100%; }
}

</style>
</head>

<body onload="verificarHoy()">

<div class="soporte">
<span id="textoSoporte"></span>
</div>

<div class="container">

<img src="logo.png" class="logo">

<div id="mensajeHoy"></div>

<div class="card">
<h2>Compra tu Pasadía 🌿</h2>

<input type="text" id="nombre" placeholder="Nombre"><br>
<input type="date" id="fecha" onchange="verificarPromo()"><br>

<div id="promoTexto"></div>

<input type="number" id="adultos" placeholder="Adultos" value="0"><br>
<input type="number" id="ninos" placeholder="Niños" value="0"><br>

<button onclick="comprar()">Calcular</button>
</div>

<div id="factura"></div>
<div id="pase"></div>

</div>

<!-- BOTONES -->
<a href="https://wa.me/573113822023" class="whatsapp">💬</a>

<a href="https://www.instagram.com/ecocabanasventanallano?igsh=aGFxeHppcjM3ZWll&utm_source=qr"
class="instagram" target="_blank">
📷 Instagram
</a>

<!-- ADMIN -->
<button onclick="abrirAdmin()" style="position:fixed;bottom:20px;left:20px;">Admin</button>

<div id="panelAdmin" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:white;overflow:auto;padding:20px;">
<h2>Reservas</h2>
<div id="listaReservas"></div>
<button onclick="cerrarAdmin()">Cerrar</button>
</div>

<script>

let mensajes=[
"📞 Atención 311 382 2023",
"🌿 Bienvenido",
"🔥 Promo miércoles",
"💳 Pagos fáciles",
"🎟 Reserva aquí"
];

let i=0;
setInterval(()=>{
document.getElementById("textoSoporte").innerText=mensajes[i];
i=(i+1)%mensajes.length;
},7000); // 👈 MÁS LENTO TAMBIÉN

function formatear(n){return n.toLocaleString("es-CO");}

let promoActiva=false;

function verificarHoy(){
if(new Date().getDay()===3){
mensajeHoy.innerHTML="<div class='alerta'>🔥 PROMO HOY</div>";
}
}

function verificarPromo(){
let f=new Date(fecha.value);
promoActiva=(f.getDay()===3);
promoTexto.innerHTML=promoActiva?"<div class='promo'>Promo activa</div>":"";
}

function guardarReserva(c,d){
let r=JSON.parse(localStorage.getItem("reservas"))||{};
r[c]=d;
localStorage.setItem("reservas",JSON.stringify(r));
}

function descargarReserva(data){
let txt=`RESERVA\nNombre:${data.nombre}\nFecha:${data.fecha}\nAdultos:${data.adultos}\nNiños:${data.ninos}\nTotal:$${formatear(data.total)}\nCodigo:${data.codigo}`;
let blob=new Blob([txt]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="reserva_"+data.codigo+".txt";
a.click();
}

function comprar(){
let n=nombre.value,f=fecha.value,a=+adultos.value,ni=+ninos.value;
let pa=promoActiva?20000:25000;
let pn=promoActiva?10000:15000;
let total=(a*pa)+(ni*pn);

factura.innerHTML=`
<div class='factura'>
Total:$${formatear(total)}<br>
<input type='file' id='comprobante'><br>
<button onclick='confirmar(${total})'>Confirmar</button>
</div>`;
}

function confirmar(total){

if(!comprobante.files.length){alert("Sube comprobante");return;}

let n=nombre.value,f=fecha.value,a=adultos.value,ni=ninos.value;
let c=Math.floor(Math.random()*900000+100000);

guardarReserva(c,{nombre:n,fecha:f,adultos:a,ninos:ni,total});

let msg=`Hola 👋%0A%0APago realizado en Hotel Ventana al Llano 🌿%0A%0A👤 ${n}%0A📅 ${f}%0A👥 Adultos: ${a}%0A👶 Niños: ${ni}%0A💰 Total: $${formatear(total)}%0A%0AAdjunto comprobante`;

window.open("https://wa.me/573113822023?text="+msg);

descargarReserva({nombre:n,fecha:f,adultos:a,ninos:ni,total,codigo:c});

pase.innerHTML=`
<div class='pase'>
<h3>🎟 PASE VIP</h3>
${n}<br>${f}<br>${c}
<div id='qr'></div>
<button onclick='window.print()'>Descargar</button>
</div>`;

new QRCode(document.getElementById("qr"),{text:c.toString(),width:120,height:120});
}

function abrirAdmin(){
if(prompt("Clave")!=="1234")return;
panelAdmin.style.display="block";
cargar();
}

function cerrarAdmin(){panelAdmin.style.display="none";}

function cargar(){
let r=JSON.parse(localStorage.getItem("reservas"))||{};
let html="";
for(let c in r){
let x=r[c];
html+=`<div>${c} - ${x.nombre} - $${formatear(x.total)} <button onclick="del('${c}')">X</button></div>`;
}
listaReservas.innerHTML=html||"Sin datos";
}

function del(c){
let r=JSON.parse(localStorage.getItem("reservas"))||{};
delete r[c];
localStorage.setItem("reservas",JSON.stringify(r));
cargar();
}

</script>

</body>
</html>
