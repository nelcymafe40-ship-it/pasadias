<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel Ventana al Llano</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
text-align:center;
margin:0;
background:linear-gradient(135deg,#d4fc79,#96e6a1);
}

.soporte{
background:linear-gradient(90deg,#11998e,#38ef7d);
color:white;
padding:12px;
position:fixed;
top:0;
width:100%;
overflow:hidden;
white-space:nowrap;
z-index:999;
}

.soporte span{
display:inline-block;
padding-left:100%;
animation:mover 25s linear infinite;
}

@keyframes mover{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

.container{
margin-top:120px;
}

.logo{
width:230px;
margin-bottom:10px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
display:inline-block;
width:340px;
}

input{
padding:12px;
margin:8px 0;
width:90%;
border-radius:10px;
border:none;
background:#f1f1f1;
}

button{
padding:12px;
margin-top:12px;
background:linear-gradient(90deg,#00c853,#64dd17);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
font-weight:bold;
}

.factura{
margin-top:20px;
background:white;
padding:15px;
border-radius:15px;
border:2px dashed #00c853;
text-align:left;
}

.promo{
background:#00c853;
color:white;
padding:12px;
border-radius:10px;
font-weight:bold;
text-align:center;
margin:10px 0;
}

.pagos{
background:#f7fff7;
padding:15px;
border-radius:12px;
margin-top:10px;
font-size:14px;
}

.codigo{
background:#000;
color:#00ff88;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:bold;
margin-top:10px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:20px;
}

.instagram{
position:fixed;
bottom:80px;
right:20px;
background:#E1306C;
color:white;
padding:12px 15px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="soporte">
<span id="textoSoporte"></span>
</div>

<div class="container">

<img src="logo.jpg" class="logo">

<div class="card">

<h2>Compra tu Pasadía "HOTEL VENTANA AL LLANO" 🌿</h2>

<input type="text" id="nombre" placeholder="Nombre completo">

<label><b>Fecha de visita</b></label>
<input type="date" id="fecha" onchange="verificarPromo()">

<div id="promoTexto"></div>

<label><b>¿Cuántos pasadías de ADULTO deseas comprar?</b></label>
<input type="number" id="adultos" value="0" min="0">

<label><b>¿Cuántos pasadías de NIÑOS deseas comprar?</b></label>
<input type="number" id="ninos" value="0" min="0">

<button onclick="comprar()">Calcular total</button>

<div id="factura"></div>

</div>
</div>

<a href="https://www.instagram.com/ecocabanasventanallano"
class="instagram" target="_blank">📷</a>

<a href="#" onclick="abrirWhatsApp()" class="whatsapp">💬</a>

<script>

let mensajes=[
"🌿 Bienvenido a Hotel Ventana al Llano",
"🎟 Reserva tu pasadía aquí",
"💳 Pagos por Nequi, Bancolombia y Llave",
"🔥 Promociones todos los miércoles",
"🍽️ Los lunes no manejamos servicio de restaurante",
"📞 Atención por WhatsApp ¡TE ESPERAMOS!"
];

let i=0;
function cambiarMensaje(){
textoSoporte.innerText=mensajes[i];
i=(i+1)%mensajes.length;
}
setInterval(cambiarMensaje,4000);
cambiarMensaje();

function verificarPromo(){
let fecha=document.getElementById("fecha").value;
let f=fecha?new Date(fecha):new Date();

if(f.getDay()===3){
promoTexto.innerHTML=`
<div class="promo">
🔥 PROMOCIÓN DÍA DE HOY MIÉRCOLES 🔥
</div>`;
}else{
promoTexto.innerHTML="";
}
}

function formatear(n){
return n.toLocaleString("es-CO");
}

function generarCodigo(){
return "RV-"+Math.floor(100000+Math.random()*900000);
}

function comprar(){

let nombre=document.getElementById("nombre").value;
let adultos=parseInt(document.getElementById("adultos").value);
let ninos=parseInt(document.getElementById("ninos").value);

adultos=isNaN(adultos)?0:adultos;
ninos=isNaN(ninos)?0:ninos;

if(!nombre){
alert("Escribe tu nombre");
return;
}

if(adultos===0 && ninos===0){
alert("Debes seleccionar al menos 1 pasadía");
return;
}

let fecha=document.getElementById("fecha").value;
let f=fecha?new Date(fecha):new Date();

let esMiercoles=f.getDay()===3;

let precioAdulto=esMiercoles?15000:25000;
let precioNino=esMiercoles?8000:15000;

let total=(adultos*precioAdulto)+(ninos*precioNino);

let codigo=generarCodigo();

factura.innerHTML=`
<div class="factura">

<b>Resumen de reserva</b><br><br>

Nombre: ${nombre}<br>
Fecha: ${fecha}<br>
Adultos: ${adultos}<br>
Niños: ${ninos}<br>

${esMiercoles?'<div class="promo">PRECIO PROMOCIÓN MIÉRCOLES</div>':''}

<b>Total a pagar: $${formatear(total)}</b>

<div class="pagos">
<b>Métodos de pago</b><br><br>

<b>Nequi</b><br>
321 277 3549<br><br>

<b>Bancolombia</b><br>
84943216770 - Ahorros<br>
Oneida Beltran<br>
CC. 35285659<br><br>

<b>Llave BRE</b><br>
86065356
</div>

<div class="codigo">
Código reserva: ${codigo}
</div>

<button onclick="enviarWhatsApp('${nombre}',${adultos},${ninos},${total},'${codigo}')">
Confirmar reserva
</button>

</div>
`;
}

function enviarWhatsApp(nombre,adultos,ninos,total,codigo){

let fecha=document.getElementById("fecha").value;

let f=fecha?new Date(fecha):new Date();
let esMiercoles=f.getDay()===3;

let mensaje=`🌿 RESERVA GENERADA - Hotel Ventana al Llano

Código de reserva: ${codigo}

Nombre: ${nombre}
Fecha de visita: ${fecha}

Detalle de compra:
Adultos: ${adultos}
Niños: ${ninos}
${esMiercoles ? 'Promoción: Miércoles' : ''}

Total a pagar: $${total}
ANEXO COMPROBANTE DE PAGO POR ESTE MEDIO, PORFAVOR CONFIRMAR`;

window.open("https://wa.me/573113822023?text="+encodeURIComponent(mensaje));
}

function abrirWhatsApp(){

let mensajes=[
"Hola, quiero información sobre los pasadías 🌿",
"Hola, me gustaría conocer disponibilidad",
"Buenas, quiero reservar",
"Hola, vengo desde la página web"
];

let mensaje=mensajes[Math.floor(Math.random()*mensajes.length)];

window.open("https://wa.me/573113822023?text="+encodeURIComponent(mensaje));
}

verificarPromo();

</script>

</body>
</html>
