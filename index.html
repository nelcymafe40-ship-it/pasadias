<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel Ventana al Llano</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family:'Segoe UI',sans-serif;
text-align:center;
margin:0;
background:linear-gradient(135deg,#d4fc79,#96e6a1);
}

.soporte{
background:linear-gradient(90deg,#11998e,#38ef7d);
color:white;
padding:12px;
position:fixed;
top:0;
width:100%;
overflow:hidden;
white-space:nowrap;
cursor:pointer;
}

.soporte span{
display:inline-block;
padding-left:100%;
animation:mover 20s linear infinite;
}

@keyframes mover{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{margin-top:120px;}

.logo{width:220px;margin-top:10px;}

.card{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:inline-block;
width:280px;
}

input{
padding:12px;
margin:8px;
width:90%;
border-radius:10px;
border:none;
background:#f1f1f1;
}

button{
padding:12px;
margin-top:12px;
background:linear-gradient(90deg,#00c853,#64dd17);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.factura,.pase{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
}

.alerta{
background:#ffeb3b;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.promo{
background:#e8f5e9;
padding:10px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}

.instagram{
position:fixed;
bottom:80px;
right:20px;
background:#E1306C;
color:white;
padding:12px 15px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

#qr{margin-top:10px;}

@media print {
body * { visibility: hidden; }
.pase, .pase * { visibility: visible; }
.pase { position:absolute; top:0; left:0; width:100%; }
}
</style>
</head>

<body onload="verificarHoy()">

<div class="soporte" onclick="abrirWhatsApp()">
<span id="textoSoporte"></span>
</div>

<div class="container">

<img src="logo.png" class="logo"
onerror="this.src='https://cdn-icons-png.flaticon.com/512/139/139899.png'">

<div id="mensajeHoy"></div>

<div class="card">
<h2>Compra tu Pasadía 🌿</h2>

<input type="text" id="nombre" placeholder="Nombre"><br>
<input type="date" id="fecha" onchange="verificarPromo()"><br>

<div id="promoTexto"></div>

<input type="number" id="adultos" value="0"><br>
<input type="number" id="ninos" value="0"><br>

<button onclick="comprar()">Calcular</button>
</div>

<div id="factura"></div>
<div id="pase"></div>

</div>

<a href="https://wa.me/573113822023" class="whatsapp">💬</a>

<a href="https://www.instagram.com/ecocabanasventanallano?igsh=aGFxeHppcjM3ZWll&utm_source=qr"
class="instagram" target="_blank">📷 Instagram</a>

<script>

// WhatsApp
function abrirWhatsApp(){
let mensaje="Hola 👋✨, quiero información sobre los pasadías en Hotel Ventana al Llano 🌿";
window.open("https://wa.me/573113822023?text="+encodeURIComponent(mensaje));
}

// barra
let mensajes=[
"📞 Atención al cliente (toca aquí)",
"🌿 Bienvenido a Ventana al Llano",
"🔥 Aprovecha nuestros pasadías",
"💳 Pagos fáciles",
"🎟 Reserva aquí"
];

let i=0;
setInterval(()=>{
textoSoporte.innerText=mensajes[i];
i=(i+1)%mensajes.length;
},5000);

function formatear(n){return n.toLocaleString("es-CO");}

let promoActiva=false;

function verificarHoy(){
if(new Date().getDay()===3){
promoActiva=true;
mensajeHoy.innerHTML="<div class='alerta'>🔥 PROMO MIÉRCOLES ACTIVA</div>";
}
}

function verificarPromo(){
let f=new Date(fecha.value);
promoActiva=(f.getDay()===3);

promoTexto.innerHTML=promoActiva
? "<div class='promo'>Adultos $20.000 | Niños $10.000</div>"
: "";
}

// COMPRA
function comprar(){
let a=+adultos.value,ni=+ninos.value;

let pa=promoActiva?20000:25000;
let pn=promoActiva?10000:15000;

let total=(a*pa)+(ni*pn);

factura.innerHTML=`
<div class='factura'>

<h3>Resumen</h3>
<strong>Total: $${formatear(total)}</strong><br><br>

<div class='promo'>
🔒 Pago seguro<br><br>

<strong>Nequi:</strong><br>
321 277 3549<br>
Oneida Beltrán<br><br>

<strong>Bancolombia:</strong><br>
84943216770 - Ahorros<br>
Oneida Beltrán<br>
CC: 35285659<br><br>

<strong>Llave BRE:</strong><br>
86065356
</div><br>

<input type='file' id='comprobante'><br>
<button onclick='confirmar(${total})'>Confirmar Pago</button>

</div>`;
}

// CONFIRMAR
function confirmar(total){

if(!comprobante.files.length){alert("Sube comprobante");return;}

let n=nombre.value,f=fecha.value,a=adultos.value,ni=ninos.value;

let tipo = promoActiva ? "PROMO MIÉRCOLES" : "TARIFA NORMAL";

// 🔥 QR CON TODA LA INFO
let infoQR =
"Hotel Ventana al Llano\n"+
"Cliente: "+n+"\n"+
"Fecha: "+f+"\n"+
"Adultos: "+a+"\n"+
"Niños: "+ni+"\n"+
"Total: $"+formatear(total)+"\n"+
"Tipo: "+tipo;

pase.innerHTML=`
<div class='pase'>
<h3>🎟 PASE OFICIAL</h3>
${n}<br>${f}<br><br>
<div id='qr'></div>
<button onclick='window.print()'>Descargar</button>
</div>`;

new QRCode(document.getElementById("qr"),{
text: infoQR,
width:120,
height:120
});
}

</script>

</body>
</html>
