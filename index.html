<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel Ventana al Llano</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
background:#f0f4f3;
margin:0;
}

/* 🔥 BARRA DINÁMICA */
.soporte{
background: linear-gradient(90deg, #25D366, #1ebea5);
color:white;
padding:12px;
font-weight:bold;
position:fixed;
top:0;
width:100%;
overflow:hidden;
white-space:nowrap;
}

.soporte span{
display:inline-block;
padding-left:100%;
animation: mover 20s linear infinite;
}

@keyframes mover{
0% { transform: translateX(0); }
100% { transform: translateX(-100%); }
}

.container{
margin-top:100px;
}

.logo{
width:280px;
margin:10px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
display:inline-block;
}

input{
padding:10px;
margin:8px;
width:200px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px;
margin-top:10px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.factura{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
}

.pase{
background:white;
border:3px dashed black;
padding:25px;
margin-top:20px;
display:inline-block;
width:320px;
}

.alerta{
background:#ffeb3b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-weight:bold;
}

.promo{
background:#e8f5e9;
padding:12px;
border-radius:10px;
margin-top:10px;
color:#1b5e20;
font-weight:bold;
}

#qr{
margin-top:10px;
}

@media print {
body * { visibility: hidden; }
.pase, .pase * { visibility: visible; }
.pase { position:absolute; top:0; left:0; width:100%; }
}
</style>
</head>

<body onload="verificarHoy()">

<!-- 🔥 BARRA ANIMADA -->
<div class="soporte">
<span id="textoSoporte"></span>
</div>

<div class="container">

<img src="logo.png" class="logo">

<div id="mensajeHoy"></div>

<div class="card">

<h2>Compra tu Pasadía 🌿</h2>

Nombre:<br>
<input type="text" id="nombre"><br>

Fecha:<br>
<input type="date" id="fecha" onchange="verificarPromo()"><br>

<div id="promoTexto"></div>

Adultos:<br>
<input type="number" id="adultos" value="0"><br>

Niños:<br>
<input type="number" id="ninos" value="0"><br>

<button onclick="comprar()">Calcular</button>

</div>

<div id="factura"></div>
<div id="pase"></div>

</div>

<script>

// 🔥 MENSAJES DINÁMICOS
let mensajes = [
"📞 Atención 24/7: 311 382 2023",
"🌿 Bienvenido a Hotel Ventana al Llano",
"🔥 Promo Miércoles: Adultos $20.000 | Niños $10.000",
"💳 Aceptamos Nequi, Bancolombia y BRE",
"🎟 Compra tu pasadía fácil y rápido aquí",
"📲 Envía tu comprobante por WhatsApp"
];

let index = 0;

function cambiarMensaje(){
document.getElementById("textoSoporte").innerText = mensajes[index];
index = (index + 1) % mensajes.length;
}

setInterval(cambiarMensaje, 4000);
cambiarMensaje();


// formato colombiano
function formatear(numero){
return numero.toLocaleString("es-CO");
}

let promoActiva = false;

function verificarHoy(){
let hoy = new Date();
if(hoy.getDay() === 3){
document.getElementById("mensajeHoy").innerHTML =
"<div class='alerta'>🔥 HOY ES MIÉRCOLES DE PROMO 🔥</div>";
}
}

function verificarPromo(){
let fecha = new Date(document.getElementById("fecha").value);
promoActiva = (fecha.getDay() === 3);

document.getElementById("promoTexto").innerHTML = promoActiva
? "<div class='promo'>Promo: Adultos $20.000 | Niños $10.000</div>"
: "";
}

function guardarReserva(codigo, data){
let reservas = JSON.parse(localStorage.getItem("reservas")) || {};
reservas[codigo] = data;
localStorage.setItem("reservas", JSON.stringify(reservas));
}

function comprar(){

let nombre=document.getElementById("nombre").value;
let fecha=document.getElementById("fecha").value;
let adultos=parseInt(document.getElementById("adultos").value);
let ninos=parseInt(document.getElementById("ninos").value);

let hoy = new Date();
let fechaSel = new Date(fecha);

if(fechaSel < hoy){
alert("No puedes elegir fechas pasadas");
return;
}

let precioAdulto = promoActiva ? 20000 : 25000;
let precioNino = promoActiva ? 10000 : 15000;

let total=(adultos*precioAdulto)+(ninos*precioNino);

document.getElementById("factura").innerHTML=
"<div class='factura'>"+
"<h3>Resumen de Reserva</h3>"+
"Cliente: "+nombre+"<br>"+
"Fecha: "+fecha+"<br>"+
"Adulto: $"+formatear(precioAdulto)+"<br>"+
"Niño: $"+formatear(precioNino)+"<br>"+
"<strong>Total: $"+formatear(total)+"</strong><br><br>"+

"<div class='promo'>"+
"🔒 Pago seguro<br><br>"+

"<strong>Nequi:</strong><br>"+
"321 277 3549<br><br>"+

"<strong>Bancolombia:</strong><br>"+
"84.943.216.770<br>"+
"Oneida Beltran<br>"+
"Cc: 35.285.659<br><br>"+

"<strong>Llave BRE:</strong><br>"+
"86065356"+

"</div><br>"+

"<input type='file' id='comprobante'><br>"+

"<button onclick='confirmar("+total+")'>Confirmar Pago</button>"+
"</div>";
}

function confirmar(total){

if(document.getElementById("comprobante").files.length==0){
alert("Sube el comprobante");
return;
}

let nombre=document.getElementById("nombre").value;
let fecha=document.getElementById("fecha").value;
let adultos=document.getElementById("adultos").value;
let ninos=document.getElementById("ninos").value;

let codigo=Math.floor(Math.random()*900000+100000);

guardarReserva(codigo,{
nombre,fecha,adultos,ninos,total,estado:"activo"
});

let tipoTarifa = promoActiva ? "PROMOCIÓN MIÉRCOLES" : "Tarifa normal";

let mensaje="Hola 👋✨%0A%0A"+
"He realizado el pago en *Hotel Ventana al Llano* 🌿%0A%0A"+
"👤 "+nombre+"%0A"+
"📅 "+fecha+"%0A%0A"+
"👥 Adultos: "+adultos+" ($"+formatear(promoActiva?20000:25000)+")%0A"+
"👶 Niños: "+ninos+" ($"+formatear(promoActiva?10000:15000)+")%0A"+
"🎟 "+tipoTarifa+"%0A%0A"+
"💰 Total: $"+formatear(total)+"%0A%0A"+
"Adjunto comprobante 🙌";

window.open("https://wa.me/573113822023?text="+mensaje);

document.getElementById("pase").innerHTML=
"<div class='pase'>"+
"<img src='logo.png' width='200'><br>"+
"<h3>PASE OFICIAL</h3>"+
"Cliente: "+nombre+"<br>"+
"Fecha: "+fecha+"<br>"+
"Código: "+codigo+"<br>"+
"<div id='qr'></div><br>"+
"<button onclick='window.print()'>Descargar</button>"+
"</div>";

new QRCode(document.getElementById("qr"), {
text: codigo.toString(),
width: 120,
height: 120
});
}

</script>

</body>
</html>
