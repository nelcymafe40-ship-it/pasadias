<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel Ventana al Llano</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family: 'Segoe UI', sans-serif;
text-align:center;
margin:0;
background: linear-gradient(135deg, #d4fc79, #96e6a1);
}

/* 🔥 BARRA DINÁMICA */
.soporte{
background: linear-gradient(90deg, #11998e, #38ef7d);
color:white;
padding:12px;
font-weight:bold;
position:fixed;
top:0;
width:100%;
overflow:hidden;
white-space:nowrap;
font-size:14px;
z-index:1000;
}

.soporte span{
display:inline-block;
padding-left:100%;
animation: mover 12s linear infinite;
}

@keyframes mover{
0% { transform: translateX(0); }
100% { transform: translateX(-100%); }
}

/* CONTENEDOR */
.container{
margin-top:120px;
}

/* LOGO */
.logo{
width:220px;
margin-bottom:15px;
}

/* TARJETA */
.card{
background: rgba(255,255,255,0.9);
backdrop-filter: blur(10px);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
display:inline-block;
width:280px;
transition:0.3s;
}

.card:hover{
transform: translateY(-5px);
}

/* INPUTS */
input{
padding:12px;
margin:8px;
width:90%;
border-radius:10px;
border:none;
outline:none;
background:#f1f1f1;
font-size:14px;
}

/* BOTÓN */
button{
padding:12px;
margin-top:12px;
background: linear-gradient(90deg, #00c853, #64dd17);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform: scale(1.05);
}

/* FACTURA */
.factura{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
animation: aparecer 0.5s ease;
}

/* PASE */
.pase{
background:white;
border-radius:15px;
padding:25px;
margin-top:20px;
display:inline-block;
width:320px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
animation: aparecer 0.5s ease;
}

@keyframes aparecer{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* ALERTA */
.alerta{
background:#ffeb3b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-weight:bold;
}

/* PROMO */
.promo{
background:#e8f5e9;
padding:12px;
border-radius:10px;
margin-top:10px;
color:#1b5e20;
font-weight:bold;
}

/* BOTÓN WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
text-decoration:none;
}

#qr{
margin-top:10px;
}

@media print {
body * { visibility: hidden; }
.pase, .pase * { visibility: visible; }
.pase { position:absolute; top:0; left:0; width:100%; }
}

</style>
</head>

<body onload="verificarHoy()">

<!-- 🔥 BARRA -->
<div class="soporte">
<span id="textoSoporte"></span>
</div>

<div class="container">

<img src="logo.png" class="logo">

<div id="mensajeHoy"></div>

<div class="card">

<h2>Compra tu Pasadía 🌿</h2>

Nombre:<br>
<input type="text" id="nombre"><br>

Fecha:<br>
<input type="date" id="fecha" onchange="verificarPromo()"><br>

<div id="promoTexto"></div>

Adultos:<br>
<input type="number" id="adultos" value="0"><br>

Niños:<br>
<input type="number" id="ninos" value="0"><br>

<button onclick="comprar()">Calcular</button>

</div>

<div id="factura"></div>
<div id="pase"></div>

</div>

<!-- BOTÓN WHATSAPP -->
<a href="https://wa.me/573113822023" class="whatsapp">💬</a>

<script>

// 🔥 MENSAJES
let mensajes = [
"📞 Atención 24/7: 311 382 2023",
"🌿 Bienvenido a Hotel Ventana al Llano",
"🔥 Promo Miércoles: Adultos $20.000 | Niños $10.000",
"💳 Aceptamos Nequi, Bancolombia y BRE",
"🎟 Reserva fácil y rápida aquí",
"📲 Envía tu comprobante por WhatsApp"
];

let index = 0;

function cambiarMensaje(){
document.getElementById("textoSoporte").innerText = mensajes[index];
index = (index + 1) % mensajes.length;
}

setInterval(cambiarMensaje, 4000);
cambiarMensaje();

function formatear(numero){
return numero.toLocaleString("es-CO");
}

let promoActiva = false;

function verificarHoy(){
let hoy = new Date();
if(hoy.getDay() === 3){
document.getElementById("mensajeHoy").innerHTML =
"<div class='alerta'>🔥 HOY ES MIÉRCOLES DE PROMO 🔥</div>";
}
}

function verificarPromo(){
let fecha = new Date(document.getElementById("fecha").value);
promoActiva = (fecha.getDay() === 3);

document.getElementById("promoTexto").innerHTML = promoActiva
? "<div class='promo'>Promo: Adultos $20.000 | Niños $10.000</div>"
: "";
}

function guardarReserva(codigo, data){
let reservas = JSON.parse(localStorage.getItem("reservas")) || {};
reservas[codigo] = data;
localStorage.setItem("reservas", JSON.stringify(reservas));
}

function comprar(){

let nombre=document.getElementById("nombre").value;
let fecha=document.getElementById("fecha").value;
let adultos=parseInt(document.getElementById("adultos").value);
let ninos=parseInt(document.getElementById("ninos").value);

let hoy = new Date();
let fechaSel = new Date(fecha);

if(fechaSel < hoy){
alert("No puedes elegir fechas pasadas");
return;
}

let precioAdulto = promoActiva ? 20000 : 25000;
let precioNino = promoActiva ? 10000 : 15000;

let total=(adultos*precioAdulto)+(ninos*precioNino);

document.getElementById("factura").innerHTML=
"<div class='factura'>"+
"<h3>Resumen de Reserva</h3>"+
"Cliente: "+nombre+"<br>"+
"Fecha: "+fecha+"<br>"+
"<strong>Total: $"+formatear(total)+"</strong><br><br>"+

"<div class='promo'>"+
"🔒 Pago seguro<br><br>"+
"Nequi: 3212773549<br>"+
"Bancolombia: 84943216770<br>"+
"Oneida Beltran<br><br>"+
"BRE: 86065356"+
"</div><br>"+

"<input type='file' id='comprobante'><br>"+
"<button onclick='confirmar("+total+")'>Confirmar Pago</button>"+
"</div>";
}

function confirmar(total){

if(document.getElementById("comprobante").files.length==0){
alert("Sube el comprobante");
return;
}

let nombre=document.getElementById("nombre").value;
let fecha=document.getElementById("fecha").value;
let codigo=Math.floor(Math.random()*900000+100000);

guardarReserva(codigo,{nombre,fecha,total});

window.open("https://wa.me/573113822023");

document.getElementById("pase").innerHTML=
"<div class='pase'>"+
"<h3>🎟 PASE VIP</h3>"+
"Cliente: "+nombre+"<br>"+
"Fecha: "+fecha+"<br>"+
"Código: "+codigo+"<br>"+
"<div id='qr'></div><br>"+
"<button onclick='window.print()'>Descargar</button>"+
"</div>";

new QRCode(document.getElementById("qr"), {
text: codigo.toString(),
width: 120,
height: 120
});
}

</script>

</body>
</html>
